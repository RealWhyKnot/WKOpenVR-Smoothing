name: CI

# Triggered on PRs and on manual dispatch. We deliberately do NOT run CI on
# direct pushes to main: every release-tag push triggers release.yml, which
# does a full build via build.ps1 -- running CI on the same SHA would be pure
# duplication. Direct-to-main pushes that aren't part of a release (docs,
# wiki, hot fixes between releases) are validated locally via build.ps1; the
# next release-tag push gives us the CI signal anyway.
#
# To run CI manually for a specific commit, use the "Run workflow" button on
# the Actions page (triggers workflow_dispatch).
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'wiki/**'
      - 'LICENSE'
      - 'NOTICE'
      - '.gitignore'
      - '.gitattributes'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/wiki-sync.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: cmake + msbuild (windows)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure
        # -DCMAKE_POLICY_VERSION_MINIMUM=3.5 keeps CMake 4.x from rejecting
        # legacy submodules that declare cmake_minimum_required(<3.5). Mirror
        # this in build.ps1.
        # -Wno-dev silences developer-mode warnings from third-party submodules.
        run: cmake -G "Visual Studio 17 2022" -A x64 -B bin -S . -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -Wno-dev

      - name: Build
        run: cmake --build bin --config Release --parallel

      - name: Stage artifacts
        shell: pwsh
        run: |
          $stage = "stage"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          if (Test-Path "bin/artifacts/Release/OpenVR-WKSmoothing.exe") {
              Copy-Item -Path "bin/artifacts/Release/OpenVR-WKSmoothing.exe" -Destination $stage
          } else {
              Write-Host "::warning::OpenVR-WKSmoothing.exe not found at bin/artifacts/Release/. Skipping stage."
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: smoothing-${{ github.sha }}
          path: stage
          if-no-files-found: ignore
          retention-days: 14
