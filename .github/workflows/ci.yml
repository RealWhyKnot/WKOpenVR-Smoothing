name: CI

# Triggered on PRs and on manual dispatch. We deliberately do NOT run CI on
# direct pushes to main: every release-tag push triggers release.yml, which
# does a full build via build.ps1 — running CI on the same SHA would be
# duplication.
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.gitattributes'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: cmake + msbuild (windows)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Configure
        # The minhook submodule's CMakeLists declares cmake_minimum_required(2.8.12)
        # which CMake 4.x rejects. The policy-version override lets us configure
        # without forking the submodule. Mirror this in build.ps1.
        run: cmake -G "Visual Studio 17 2022" -A x64 -B bin -S . -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -Wno-dev

      - name: Build
        run: cmake --build bin --config Release --parallel

      - name: Stage artifacts
        shell: pwsh
        run: |
          $stage = "stage"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item -Path "bin/artifacts/Release/FingerSmoothing.exe" -Destination $stage
          Copy-Item -Path "bin/driver_01fingersmoothing" -Destination $stage -Recurse

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: fingersmoothing-${{ github.sha }}
          path: stage
          if-no-files-found: error
          retention-days: 14
